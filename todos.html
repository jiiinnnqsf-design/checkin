<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的待办</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #7c6fcd; --primary-light: #eeeaff; --primary-mid: #b8b0ee;
    --success: #5aaa7e; --success-light: #e8f7ef;
    --warning: #d9965a; --warning-light: #fdf3e8;
    --danger: #d97a7a; --danger-light: #fdf0f0;
    --text: #3a3a4a; --text-muted: #8a8ea8;
    --border: #e6e8f2; --bg: #f5f5fb; --card: #fff;
    --radius: 16px; --shadow: 0 2px 14px rgba(80,70,150,0.07);
    --shadow-lg: 0 8px 28px rgba(100,90,180,0.13);
  }
  body { font-family: -apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 60px; }
  .loading-mask { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 12px; }
  .loading-dot { font-size: 32px; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes slideUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
  .hidden { display: none !important; }

  /* Header */
  header { background: var(--card); border-bottom: 1px solid var(--border); height: 58px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 6px rgba(80,70,140,0.06); }
  .page-title { font-size: 16px; font-weight: 800; color: var(--primary); }
  .nav-links { display: flex; gap: 10px; align-items: center; }
  .nav-link { font-size: 12px; color: var(--text-muted); text-decoration: none; padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border); transition: all .15s; }
  .nav-link:hover { color: var(--primary); border-color: var(--primary-mid); }
  .user-chip { display: flex; align-items: center; gap: 5px; background: var(--primary-light); color: var(--primary); padding: 5px 11px; border-radius: 20px; font-size: 13px; font-weight: 600; }

  .container { max-width: 680px; margin: 0 auto; padding: 18px 16px; }
  .section-card { background: var(--card); border-radius: var(--radius); margin-bottom: 14px; box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
  .section-header { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
  .section-title { font-size: 14px; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .section-body { padding: 0 18px 16px; border-top: 1px solid var(--border); }

  /* Calendar */
  .cal-title-row { display: flex; align-items: center; gap: 6px; padding: 12px 14px 6px; position: relative; }
  .cal-month { font-size: 13px; font-weight: 800; color: var(--primary); flex: 1; text-align: center; cursor: pointer; padding: 3px 8px; border-radius: 8px; transition: background .12s; }
  .cal-month:hover { background: var(--primary-light); }
  .cal-nav { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 2px 6px; border-radius: 6px; line-height: 1; }
  .cal-nav:hover { background: var(--bg); color: var(--primary); }
  .cal-hint-sm { font-size: 11px; color: var(--text-muted); }
  /* Year-month picker popup */
  .ym-popup { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 8px 28px rgba(80,70,150,0.15); z-index: 50; padding: 14px 16px; width: 240px; }
  .ym-year-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .ym-year-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--text-muted); padding: 2px 8px; border-radius: 6px; }
  .ym-year-btn:hover { background: var(--bg); color: var(--primary); }
  .ym-year-val { font-size: 15px; font-weight: 800; color: var(--primary); }
  .ym-months { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .ym-m { padding: 6px 0; text-align: center; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-muted); border: 1.5px solid transparent; transition: all .12s; }
  .ym-m:hover { background: var(--bg); color: var(--primary); }
  .ym-m.active { background: var(--primary); color: white; border-color: var(--primary); }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; padding: 0 10px 8px; }
  .cal-dh { text-align: center; font-size: 10px; color: var(--text-muted); font-weight: 600; padding: 3px 0; }
  .cal-day { height: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 7px; cursor: pointer; font-size: 12px; gap: 2px; transition: background .12s; user-select: none; }
  .cal-day:hover:not(.empty) { background: var(--bg); }
  .cal-day.today { background: var(--primary-light); color: var(--primary); font-weight: 800; }
  .cal-day.selected { background: var(--primary) !important; color: white !important; }
  .cal-dot { width: 4px; height: 4px; background: var(--primary); border-radius: 50%; }
  .cal-day.selected .cal-dot { background: rgba(255,255,255,0.8); }
  .cal-day.empty { cursor: default; }

  /* Filter bar */
  .filter-bar { display: flex; gap: 6px; padding: 0 18px 14px; }
  .filter-tab { padding: 6px 16px; border-radius: 20px; border: 1.5px solid var(--border); font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all .15s; background: var(--bg); }
  .filter-tab.active { background: var(--primary); border-color: var(--primary); color: white; }
  .filter-tab:hover:not(.active) { border-color: var(--primary-mid); color: var(--primary); }

  /* Todo items */
  .todo-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f0f1f8; }
  .todo-item:last-child { border-bottom: none; }
  .todo-check { width: 21px; height: 21px; border: 2px solid #d0d4e8; border-radius: 7px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; margin-top: 1px; }
  .todo-check:hover { border-color: var(--success); background: var(--success-light); }
  .todo-check.checked { background: var(--success); border-color: var(--success); }
  .todo-check.checked::after { content: '✓'; color: white; font-size: 12px; font-weight: 900; }
  .todo-check.anim-complete { animation: checkBounce .45s ease forwards; }
  @keyframes checkBounce { 0%{transform:scale(1)} 35%{transform:scale(1.55);background:var(--success);border-color:var(--success)} 65%{transform:scale(0.9)} 100%{transform:scale(1)} }
  .todo-main { flex: 1; min-width: 0; }
  .todo-text { font-size: 14px; line-height: 1.6; cursor: text; }
  .todo-text.done { text-decoration: line-through; color: var(--text-muted); }
  .todo-edit-input { width: 100%; border: 1.5px solid var(--primary); border-radius: 8px; padding: 4px 10px; font-size: 14px; font-family: inherit; outline: none; }
  .todo-meta { margin-top: 3px; }
  .due-tag { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 5px; }
  .due-today { background: #fef3e2; color: #b07a30; }
  .due-week { background: #e8f4fd; color: #3a7abf; }
  .due-month { background: #eef2ff; color: #5a67d8; }
  .due-custom { background: var(--primary-light); color: var(--primary); }
  .due-overdue { background: var(--danger-light); color: #b85a5a; }
  .todo-actions { display: flex; align-items: center; gap: 3px; opacity: 0; transition: opacity .15s; flex-shrink: 0; }
  .todo-item:hover .todo-actions { opacity: 1; }
  .todo-action-btn { background: none; border: none; cursor: pointer; font-size: 13px; padding: 3px 5px; border-radius: 6px; }
  .todo-action-btn:hover { background: var(--bg); }
  .todo-action-del { color: var(--danger); font-size: 16px; }

  /* Add todo */
  .add-todo-wrap { background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-top: 10px; transition: border-color .2s, box-shadow .2s; }
  .add-todo-wrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,111,205,0.1); }
  .add-todo-row { display: flex; gap: 8px; align-items: center; }
  .add-todo-input { flex: 1; border: none; outline: none; font-size: 14px; font-family: inherit; background: transparent; color: var(--text); }
  .add-todo-input::placeholder { color: #b8bcd0; }
  .add-todo-submit { padding: 6px 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .add-todo-submit:hover { background: #6a5ec0; }
  .date-chips { display: flex; gap: 6px; margin-top: 9px; flex-wrap: wrap; }
  .date-chip { padding: 3px 11px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-muted); background: var(--card); transition: all .12s; }
  .date-chip.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
  .date-chip:hover:not(.active) { border-color: var(--primary-mid); }

  /* Done section */
  .done-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--text-muted); cursor: pointer; padding: 10px 0 4px; user-select: none; }
  .done-toggle:hover { color: var(--success); }
  .done-chev { font-size: 12px; transition: transform .2s; }
  .done-chev.open { transform: rotate(90deg); }

  /* Goals */
  .goal-item { padding: 12px 0; border-bottom: 1px solid #f0f1f8; }
  .goal-item:last-child { border-bottom: none; }
  .goal-row { display: flex; align-items: flex-start; gap: 10px; }
  .goal-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
  .goal-main { flex: 1; min-width: 0; }
  .goal-title { font-size: 14px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .goal-note { font-size: 13px; color: var(--text-muted); margin-top: 4px; line-height: 1.6; }
  .goal-deadline { font-size: 12px; margin-top: 6px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .days-left { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 6px; font-weight: 700; font-size: 12px; }
  .days-ok { background: var(--success-light); color: var(--success); }
  .days-warn { background: var(--warning-light); color: var(--warning); }
  .days-late { background: var(--danger-light); color: var(--danger); }
  .goal-badge-public { background: var(--primary-light); color: var(--primary); font-size: 11px; font-weight: 600; padding: 1px 7px; border-radius: 5px; }
  .goal-badge-private { background: #f0f0f8; color: #aaa; font-size: 11px; font-weight: 600; padding: 1px 7px; border-radius: 5px; }
  .goal-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; flex-shrink: 0; }
  .goal-item:hover .goal-actions { opacity: 1; }
  .goal-act-btn { background: none; border: none; cursor: pointer; font-size: 13px; padding: 3px 6px; border-radius: 6px; }
  .goal-act-btn:hover { background: var(--bg); }

  /* Add goal */
  .add-goal-form { background: var(--bg); border: 1.5px dashed var(--border); border-radius: 12px; padding: 14px; margin-top: 10px; }
  .add-goal-form:focus-within { border-color: var(--primary); border-style: solid; }
  .form-row { margin-bottom: 10px; }
  .form-label { font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 5px; }
  .form-input { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 9px; font-size: 14px; font-family: inherit; outline: none; color: var(--text); transition: border-color .2s; }
  .form-input:focus { border-color: var(--primary); }
  textarea.form-input { resize: none; height: 70px; }
  .form-row-inline { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 10px; flex-wrap: wrap; }
  .form-row-inline > * { flex: 1; min-width: 130px; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; }
  .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 11px; cursor: pointer; transition: .3s; }
  .toggle-slider::before { content: ''; position: absolute; left: 3px; top: 3px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: .3s; }
  .toggle input:checked + .toggle-slider { background: var(--primary); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }
  .form-btn-row { display: flex; gap: 8px; }
  .btn-sm { padding: 8px 16px; border-radius: 9px; border: none; cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit; }
  .btn-sm-primary { background: var(--primary); color: white; }
  .btn-sm-primary:hover { background: #6a5ec0; }
  .btn-sm-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-muted); }
  .btn-sm-outline:hover { border-color: var(--primary); color: var(--primary); }
  .add-btn { display: flex; align-items: center; gap: 5px; padding: 6px 12px; background: transparent; border: 1.5px solid var(--border); border-radius: 9px; color: var(--text-muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .add-btn:hover { border-color: var(--primary-mid); color: var(--primary); }

  .empty-hint { text-align: center; color: var(--text-muted); font-size: 13px; padding: 18px 0; }
  footer { text-align: center; padding: 20px; font-size: 12px; color: #c4c8da; }
</style>
</head>
<body>

<div class="loading-mask" id="loadingMask">
  <div class="loading-dot">📝</div>
  <div style="color:var(--text-muted);font-size:14px">加载中…</div>
</div>

<header>
  <div style="display:flex;align-items:center;gap:10px">
    <a href="/" style="color:var(--text-muted);font-size:20px;text-decoration:none;line-height:1">←</a>
    <span class="page-title">我的待办</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <a href="/room.html" class="nav-link">📚 自习室</a>
    <div class="user-chip">👤 <span id="headerName">--</span></div>
  </div>
</header>

<div class="container">

  <!-- Long-term Goals -->
  <div class="section-card" id="goalsCard">
    <div class="section-header">
      <div class="section-title">🎯 长期进度</div>
      <button class="add-btn" id="showGoalFormBtn" onclick="toggleGoalForm()">＋ 添加</button>
    </div>
    <div class="section-body">
      <div id="goalList"></div>
      <!-- Add goal form (hidden by default) -->
      <div class="add-goal-form hidden" id="goalForm">
        <div class="form-row">
          <div class="form-label">目标标题 *</div>
          <input class="form-input" id="goalTitle" placeholder="例：读完《平凡的世界》" maxlength="60">
        </div>
        <div class="form-row">
          <div class="form-label">备注（选填）</div>
          <textarea class="form-input" id="goalNote" placeholder="详细说明…" maxlength="300"></textarea>
        </div>
        <div class="form-row-inline">
          <div>
            <div class="form-label">开始日期（选填）</div>
            <input type="date" class="form-input" id="goalStartDate">
          </div>
          <div>
            <div class="form-label">截止日期（选填）</div>
            <input type="date" class="form-input" id="goalDeadline">
          </div>
          <div>
            <div class="form-label">在自习室公开</div>
            <div class="toggle-row" style="margin-top:8px">
              <span style="font-size:13px;color:var(--text-muted)">公开给室友看</span>
              <label class="toggle">
                <input type="checkbox" id="goalPublic" checked>
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
        </div>
        <div class="form-btn-row">
          <button class="btn-sm btn-sm-primary" onclick="saveGoal()">保存</button>
          <button class="btn-sm btn-sm-outline" onclick="toggleGoalForm()">取消</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Calendar + Todos -->
  <div class="section-card">
    <!-- Calendar -->
    <div class="cal-title-row">
      <button class="cal-nav" onclick="shiftCal(-1)">‹</button>
      <span class="cal-month" id="calMonth" onclick="toggleYMPicker()"></span>
      <button class="cal-nav" onclick="shiftCal(1)">›</button>
      <span class="cal-hint-sm">紫点 = 有待办</span>
      <div class="ym-popup hidden" id="ymPopup"></div>
    </div>
    <div class="cal-grid" id="calGrid">
      <div class="cal-dh">一</div><div class="cal-dh">二</div><div class="cal-dh">三</div>
      <div class="cal-dh">四</div><div class="cal-dh">五</div><div class="cal-dh">六</div><div class="cal-dh">日</div>
    </div>

    <!-- Filter -->
    <div class="filter-bar">
      <div class="filter-tab active" id="ft-today" onclick="setFilter('today')">本日</div>
      <div class="filter-tab" id="ft-week"  onclick="setFilter('week')">本周</div>
      <div class="filter-tab" id="ft-month" onclick="setFilter('month')">本月</div>
      <div class="filter-tab" id="ft-all"   onclick="setFilter('all')">全部</div>
    </div>

    <!-- Todo list -->
    <div style="padding: 0 18px">
      <div id="todoList"></div>
      <div id="doneSep"></div>

      <div class="add-todo-wrap">
        <div class="add-todo-row">
          <input class="add-todo-input" id="todoInput" placeholder="添加待办…" maxlength="150"
            onkeydown="if(event.key==='Enter')addTodo()">
          <button class="add-todo-submit" onclick="addTodo()">添加</button>
        </div>
        <div class="date-chips">
          <div class="date-chip active" id="dc-today"  onclick="setAddDue('today')">本日</div>
          <div class="date-chip"        id="dc-week"   onclick="setAddDue('week')">本周</div>
          <div class="date-chip"        id="dc-month"  onclick="setAddDue('month')">本月</div>
          <div class="date-chip"        id="dc-custom" onclick="openCustomDate()">📅 选日期</div>
        </div>
        <input type="date" id="customDateInput" style="display:none;margin-top:8px;padding:6px 10px;border:1.5px solid var(--primary);border-radius:10px;font-size:13px;font-family:inherit;color:var(--text);outline:none;" onchange="pickCustomDate(this.value)">
        <div style="margin-top:10px;display:flex;align-items:center;justify-content:space-between;padding:6px 2px">
          <span style="font-size:12px;color:var(--text-muted);font-weight:600">公开到自习室</span>
          <label class="toggle" style="width:36px;height:20px">
            <input type="checkbox" id="todoPublicToggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>
    <div style="height:4px"></div>
  </div>

</div>

<footer>语擦女读书会 &nbsp;·&nbsp; <a href="/" style="color:#c4c8da;text-decoration:none">返回打卡</a></footer>

<script>
const SUPABASE_URL = 'https://nepjhfhbxgxlqsbhvwsa.supabase.co'
const SUPABASE_ANON_KEY = 'sb_publishable_j18YmVc3EyArtsnNe_Oqbw_w4H90A_1'
const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

let userName = localStorage.getItem('checkin_name') || ''
let activeRound = null
let myTodos = []   // private todos
let myGoals = []
let currentFilter = 'today'
let addDueDate = 'today'
let editingGoalId = null
let doneOpen = true
let calViewYear = new Date().getFullYear()
let calViewMonth = new Date().getMonth()

/* --- date utils --- */
function todayStr() { return new Date().toISOString().slice(0,10) }
function weekEnd()  { const d=new Date(); d.setDate(d.getDate()-((d.getDay()+6)%7)+6); return d.toISOString().slice(0,10) }
function weekStart(){ const d=new Date(); d.setDate(d.getDate()-((d.getDay()+6)%7)); return d.toISOString().slice(0,10) }
function monthStart(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01` }
function monthEnd() { const d=new Date(); return new Date(d.getFullYear(),d.getMonth()+1,0).toISOString().slice(0,10) }
function getDueDate(k) {
  if (k==='today') return todayStr()
  if (k==='week')  return weekEnd()
  if (k==='month') return monthEnd()
  if (k&&/^\d{4}-\d{2}-\d{2}$/.test(k)) return k
  return null
}
function filterMatches(t) {
  if (currentFilter==='all') return true
  if (!t.due_date) return false
  if (currentFilter==='today') return t.due_date===todayStr()
  if (currentFilter==='week')  return t.due_date>=weekStart()&&t.due_date<=weekEnd()
  if (currentFilter==='month') return t.due_date>=monthStart()&&t.due_date<=monthEnd()
  return t.due_date===currentFilter
}
function dueDateLabel(d) {
  if (!d) return null
  const t=todayStr()
  if (d<t) return {text:`${d} 已过期`,cls:'due-overdue'}
  if (d===t) return {text:'今天',cls:'due-today'}
  if (d>=weekStart()&&d<=weekEnd()) return {text:'本周',cls:'due-week'}
  if (d>=monthStart()&&d<=monthEnd()) return {text:'本月',cls:'due-month'}
  return {text:d,cls:'due-custom'}
}
function daysLeft(deadline) {
  if (!deadline) return null
  const diff = Math.ceil((new Date(deadline)-new Date(todayStr()))/(1000*86400))
  return diff
}

async function init() {
  const { data: round } = await db.from('rounds').select('*').eq('is_active',true).single()
  activeRound = round||null
  document.getElementById('loadingMask').style.display='none'
  if (!userName) { userName = prompt('请输入你的名字：')?.trim()||''; if (!userName) { location.href='/'; return } localStorage.setItem('checkin_name',userName) }
  document.getElementById('headerName').textContent = userName
  await loadData()
}

async function loadData() {
  // All todos (private + public)
  let tq = db.from('todos').select('*').eq('name',userName).order('created_at',{ascending:true})
  if (activeRound) tq = tq.eq('round_id',activeRound.id)
  const { data: todos } = await tq
  myTodos = todos||[]

  // Goals
  let gq = db.from('goals').select('*').eq('name',userName).order('created_at',{ascending:true})
  if (activeRound) gq = gq.eq('round_id',activeRound.id)
  const { data: goals } = await gq
  myGoals = goals||[]

  renderCalendar()
  renderTodos()
  renderGoals()
}

/* --- Calendar --- */
function shiftCal(dir) {
  calViewMonth += dir
  if (calViewMonth < 0) { calViewMonth = 11; calViewYear-- }
  if (calViewMonth > 11) { calViewMonth = 0; calViewYear++ }
  renderCalendar()
  renderYMPicker()
}

let ymPickerYear = calViewYear
function toggleYMPicker() {
  const p = document.getElementById('ymPopup')
  if (p.classList.contains('hidden')) {
    ymPickerYear = calViewYear
    renderYMPicker()
    p.classList.remove('hidden')
    // close on outside click
    setTimeout(() => document.addEventListener('click', closeYMOnOutside), 0)
  } else {
    p.classList.add('hidden')
    document.removeEventListener('click', closeYMOnOutside)
  }
}
function closeYMOnOutside(e) {
  const p = document.getElementById('ymPopup')
  if (!p.contains(e.target) && e.target.id !== 'calMonth') {
    p.classList.add('hidden')
    document.removeEventListener('click', closeYMOnOutside)
  }
}
function renderYMPicker() {
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月']
  document.getElementById('ymPopup').innerHTML = `
    <div class="ym-year-row">
      <button class="ym-year-btn" onclick="ymShiftYear(-1);event.stopPropagation()">‹</button>
      <span class="ym-year-val">${ymPickerYear}</span>
      <button class="ym-year-btn" onclick="ymShiftYear(1);event.stopPropagation()">›</button>
    </div>
    <div class="ym-months">
      ${months.map((m,i) => `<div class="ym-m ${ymPickerYear===calViewYear&&i===calViewMonth?'active':''}" onclick="pickYM(${ymPickerYear},${i});event.stopPropagation()">${m}</div>`).join('')}
    </div>`
}
function ymShiftYear(dir) {
  ymPickerYear += dir
  renderYMPicker()
}
function pickYM(year, month) {
  calViewYear = year; calViewMonth = month
  document.getElementById('ymPopup').classList.add('hidden')
  document.removeEventListener('click', closeYMOnOutside)
  renderCalendar()
}

function renderCalendar() {
  const year = calViewYear, month = calViewMonth
  const todayFull = todayStr()
  document.getElementById('calMonth').textContent = `${year}年${month+1}月`
  const firstDay = new Date(year,month,1).getDay()
  const daysInMonth = new Date(year,month+1,0).getDate()
  const offset = (firstDay+6)%7

  // collect dates with pending todos
  const dotDates = new Set(myTodos.filter(t=>!t.done&&t.due_date).map(t=>t.due_date))

  const grid = document.getElementById('calGrid')
  const headers = Array.from(grid.querySelectorAll('.cal-dh'))
  grid.innerHTML = ''
  headers.forEach(h => grid.appendChild(h))

  for(let i=0;i<offset;i++) {
    const el=document.createElement('div'); el.className='cal-day empty'; grid.appendChild(el)
  }
  for(let d=1;d<=daysInMonth;d++) {
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
    const isToday=dateStr===todayFull
    const hasDot=dotDates.has(dateStr)
    const isSelected=currentFilter===dateStr||(currentFilter==='today'&&isToday)
    const el=document.createElement('div')
    el.className='cal-day'+(isToday?' today':'')+(isSelected?' selected':'')
    el.innerHTML=`<span>${d}</span>${hasDot?'<div class="cal-dot"></div>':''}`
    el.onclick=()=>{ setFilter(dateStr) }
    grid.appendChild(el)
  }
}

/* --- Filter --- */
function setFilter(f) {
  currentFilter = f
  // 点击日历具体日期时，自动设置添加截止日期
  if(f!=='today'&&f!=='week'&&f!=='month'&&f!=='all'){
    addDueDate=f
    const inp=document.getElementById('customDateInput')
    if(inp)inp.style.display='none'
    updateDateChips()
  }
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'))
  if (f==='today') document.getElementById('ft-today')?.classList.add('active')
  else if (f==='week') document.getElementById('ft-week')?.classList.add('active')
  else if (f==='month') document.getElementById('ft-month')?.classList.add('active')
  else if (f==='all') document.getElementById('ft-all')?.classList.add('active')
  renderCalendar()
  renderTodos()
}

function setAddDue(k) {
  addDueDate=k
  const inp=document.getElementById('customDateInput')
  if(inp)inp.style.display='none'
  updateDateChips()
}
function updateDateChips(){
  document.querySelectorAll('.date-chip').forEach(c=>c.classList.remove('active'))
  if(addDueDate==='today')document.getElementById('dc-today')?.classList.add('active')
  else if(addDueDate==='week')document.getElementById('dc-week')?.classList.add('active')
  else if(addDueDate==='month')document.getElementById('dc-month')?.classList.add('active')
  else document.getElementById('dc-custom')?.classList.add('active')
}
function openCustomDate(){
  const inp=document.getElementById('customDateInput')
  if(!inp)return
  inp.style.display=inp.style.display==='none'?'block':'none'
  if(inp.style.display==='block'){
    inp.value=addDueDate!=='today'&&addDueDate!=='week'&&addDueDate!=='month'?addDueDate:todayStr()
    try{inp.showPicker()}catch(e){inp.focus()}
  }
}
function pickCustomDate(val){
  if(!val)return
  addDueDate=val
  document.getElementById('customDateInput').style.display='none'
  updateDateChips()
}

/* --- Todos --- */
function renderTodos() {
  const filtered = myTodos.filter(filterMatches)
  const pending = filtered.filter(t=>!t.done)
  const done = filtered.filter(t=>t.done)
  const filterLabel = currentFilter==='today'?'本日':currentFilter==='week'?'本周':currentFilter==='month'?'本月':currentFilter

  let html = ''
  if (pending.length===0&&done.length===0) {
    html = `<div class="empty-hint">${filterLabel}没有待办，快添加一个吧 👇</div>`
  } else {
    html = pending.map(t=>todoItemHtml(t)).join('')
  }
  document.getElementById('todoList').innerHTML = html

  // Done section
  const doneSep = document.getElementById('doneSep')
  if (done.length>0) {
    doneSep.innerHTML = `
      <div class="done-toggle" onclick="toggleDone()">
        <span class="done-chev ${doneOpen?'open':''}">›</span>
        ✅ 已完成 (${done.length})
      </div>
      <div id="doneList" style="${doneOpen?'':'display:none'}">${done.map(t=>todoItemHtml(t)).join('')}</div>`
  } else { doneSep.innerHTML = '' }
}

function todoItemHtml(t) {
  const lbl = t.due_date?dueDateLabel(t.due_date):null
  const isPublic = !t.private
  return `<div class="todo-item" id="todo-${t.id}">
    <div class="todo-check ${t.done?'checked':''}" id="chk-${t.id}" onclick="toggleTodo(${t.id})"></div>
    <div class="todo-main">
      <div class="todo-text ${t.done?'done':''}" id="txt-${t.id}" ondblclick="startEdit(${t.id})">${escHtml(t.content)}</div>
      <div class="todo-meta" style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:3px">
        ${lbl?`<span class="due-tag ${lbl.cls}">${lbl.text}</span>`:''}
        ${isPublic?`<span style="font-size:11px;font-weight:600;padding:1px 6px;border-radius:5px;background:#eeeaff;color:#7c6fcd">👥 自习室可见</span>`:''}
      </div>
    </div>
    <div class="todo-actions" id="act-${t.id}">
      <button class="todo-action-btn" onclick="startEdit(${t.id})">✏️</button>
      <button class="todo-action-btn todo-action-del" onclick="deleteTodo(${t.id})">×</button>
    </div>
  </div>`
}

function toggleDone() {
  doneOpen = !doneOpen
  const el=document.getElementById('doneList')
  const chev=document.querySelector('.done-chev')
  if(el){el.style.display=doneOpen?'':'none'}
  if(chev){chev.classList.toggle('open',doneOpen)}
}

async function toggleTodo(id) {
  const todo=myTodos.find(t=>t.id===id); if(!todo) return
  const newDone=!todo.done
  const chk=document.getElementById(`chk-${id}`)
  if(newDone&&chk){chk.classList.add('anim-complete');await new Promise(r=>setTimeout(r,460))}
  await db.from('todos').update({done:newDone}).eq('id',id)
  todo.done=newDone; renderCalendar(); renderTodos()
}

async function addTodo() {
  const input=document.getElementById('todoInput')
  const content=input?.value.trim(); if(!content) return
  input.value=''
  const dueVal=getDueDate(addDueDate)
  const isPublic=document.getElementById('todoPublicToggle')?.checked||false
  const {data}=await db.from('todos').insert({
    name:userName,content,done:false,private:!isPublic,
    round_id:activeRound?activeRound.id:null,due_date:dueVal
  }).select().single()
  if(data){myTodos.push(data);renderCalendar();renderTodos()}
  setTimeout(()=>document.getElementById('todoInput')?.focus(),30)
}

function startEdit(id) {
  const todo=myTodos.find(t=>t.id===id); if(!todo) return
  const txtEl=document.getElementById(`txt-${id}`)
  const actEl=document.getElementById(`act-${id}`)
  if(!txtEl) return
  const input=document.createElement('input')
  input.className='todo-edit-input'; input.value=todo.content
  input.onblur=()=>saveEdit(id,input.value)
  input.onkeydown=e=>{if(e.key==='Enter')input.blur();if(e.key==='Escape')renderTodos()}
  txtEl.replaceWith(input); if(actEl)actEl.style.opacity='0'
  input.focus(); input.select()
}

async function saveEdit(id, newContent) {
  const content=newContent.trim()
  const todo=myTodos.find(t=>t.id===id); if(!todo) return
  if(content&&content!==todo.content){
    await db.from('todos').update({content}).eq('id',id); todo.content=content
  }
  renderTodos()
}

async function deleteTodo(id) {
  const el=document.getElementById(`todo-${id}`)
  if(el){el.style.opacity='0';el.style.transition='opacity .18s'}
  await new Promise(r=>setTimeout(r,180))
  await db.from('todos').delete().eq('id',id)
  myTodos=myTodos.filter(t=>t.id!==id); renderCalendar(); renderTodos()
}

/* --- Goals --- */
function renderGoals() {
  const el=document.getElementById('goalList')
  if(!myGoals.length){el.innerHTML='<div class="empty-hint">还没有长期目标</div>';return}
  el.innerHTML=myGoals.map(g=>{
    const dl=g.deadline?daysLeft(g.deadline):null
    let dlHtml=''
    if(dl!==null){
      const cls=dl>7?'days-ok':dl>=0?'days-warn':'days-late'
      const txt=dl<0?`已超期 ${-dl} 天`:dl===0?'今天截止':`还剩 ${dl} 天`
      dlHtml=`<span class="days-left ${cls}">⏳ ${txt}</span>`
    }
    return `<div class="goal-item" id="goal-${g.id}">
      <div class="goal-row">
        <div class="goal-icon">🎯</div>
        <div class="goal-main">
          <div class="goal-title">
            ${escHtml(g.title)}
            <span class="${g.public_in_room?'goal-badge-public':'goal-badge-private'}">${g.public_in_room?'自习室可见':'仅自己'}</span>
          </div>
          ${g.note?`<div class="goal-note">${escHtml(g.note)}</div>`:''}
          <div class="goal-deadline">
            ${g.start_date?`<span style="font-size:11px;color:var(--text-muted)">开始 ${g.start_date}</span>`:''}
            ${g.start_date&&g.deadline?`<span style="font-size:11px;color:#ccc">→</span>`:''}
            ${g.deadline?`<span style="font-size:11px;color:var(--text-muted)">截止 ${g.deadline}</span>`:''}
            ${dlHtml}
          </div>
        </div>
        <div class="goal-actions">
          <button class="goal-act-btn" onclick="editGoal(${g.id})">✏️</button>
          <button class="goal-act-btn" style="color:var(--danger)" onclick="deleteGoal(${g.id})">×</button>
        </div>
      </div>
    </div>`
  }).join('')
}

function toggleGoalForm() {
  const form=document.getElementById('goalForm')
  const show=form.classList.contains('hidden')
  form.classList.toggle('hidden',!show)
  if(show){
    editingGoalId=null
    document.getElementById('goalTitle').value=''
    document.getElementById('goalNote').value=''
    document.getElementById('goalStartDate').value=''
    document.getElementById('goalDeadline').value=''
    document.getElementById('goalPublic').checked=true
    document.getElementById('goalTitle').focus()
  }
}

function editGoal(id) {
  const goal=myGoals.find(g=>g.id===id); if(!goal) return
  editingGoalId=id
  document.getElementById('goalTitle').value=goal.title
  document.getElementById('goalNote').value=goal.note||''
  document.getElementById('goalStartDate').value=goal.start_date||''
  document.getElementById('goalDeadline').value=goal.deadline||''
  document.getElementById('goalPublic').checked=!!goal.public_in_room
  document.getElementById('goalForm').classList.remove('hidden')
  document.getElementById('goalTitle').focus()
}

async function saveGoal() {
  const title=document.getElementById('goalTitle').value.trim()
  if(!title){alert('请填写目标标题');return}
  const payload={
    name:userName, title,
    note:document.getElementById('goalNote').value.trim()||null,
    start_date:document.getElementById('goalStartDate').value||null,
    deadline:document.getElementById('goalDeadline').value||null,
    public_in_room:document.getElementById('goalPublic').checked,
    round_id:activeRound?activeRound.id:null
  }
  if(editingGoalId){
    await db.from('goals').update(payload).eq('id',editingGoalId)
    const idx=myGoals.findIndex(g=>g.id===editingGoalId)
    if(idx>=0) myGoals[idx]={...myGoals[idx],...payload}
  } else {
    const {data}=await db.from('goals').insert(payload).select().single()
    if(data) myGoals.push(data)
  }
  editingGoalId=null
  document.getElementById('goalForm').classList.add('hidden')
  renderGoals()
}

async function deleteGoal(id) {
  if(!confirm('确定删除此目标吗？')) return
  await db.from('goals').delete().eq('id',id)
  myGoals=myGoals.filter(g=>g.id!==id); renderGoals()
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

init()
</script>
